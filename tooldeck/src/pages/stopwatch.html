<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ToolDeck - Stopwatch</title>
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body>
  <div class="bodyBorder">
    <a href="../../index.html" class="">
        Back
    </a>

    <h2 class="subPageHeader">
        Stopwatch
    </h2>
    <div id="stopwatchDisplay" class="stopwatchDisplay">00:00:00.000</div>

    <div class="btnStopwatchGroup">
      <button class="functionalButton" id="startStopBtn">Start</button>
      <button class="functionalButton" id="pauseBtn">Pause</button>
      <button class="functionalButton" id="lapBtn">Lap</button>
      <button class="functionalButton" id="resetBtn">Reset</button>
    </div>

    <div class="lapList">
      <h3>Laps</h3>
      <ul class="lapList2" id="lapTimes"></ul>
    </div>
  </div>

  <script src="../js_files/stopwatch.js"></script>
</body>
</html>
