<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ToolDeck - Timer</title>
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body>
  <div class="bodyBorder">

    <a href="../../index.html">Back</a>

    <h2 class="subPageHeader">
      Countdown Timer
    </h2>

    <div class="numberInputGroup">
      <input class="timerInputBox" type="number" id="days" min="0" placeholder="Days" />
      <input class="timerInputBox" type="number" id="hours" min="0" max="23" placeholder="Hours" />
      <input class="timerInputBox" type="number" id="minutes" min="0" max="59" placeholder="Minutes" />
      <input class="timerInputBox" type="number" id="seconds" min="0" max="59" placeholder="Seconds" />
    </div>

    <div class="btnTimerGroup">
      <button class="functionalButton" id="startStopBtn">Start</button>
      <button class="functionalButton" id="pauseBtn">Pause</button>
      <button class="functionalButton" id="resetBtn">Reset</button>
    </div>

    <div id="countdownDisplay" class="countdownDisplay"></div>
  </div>

  <script src="../js_files/timer.js"></script>
</body>
</html>
